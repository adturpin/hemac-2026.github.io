<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEMAC Dijon 2026 – Mon Planning</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#111827;color:#e2e8f0;min-height:100vh}
h1{text-align:center;padding:18px 16px 4px;color:#f59e0b;font-size:1.5em;letter-spacing:2px}
.subtitle{text-align:center;color:#94a3b8;font-size:.85em;padding:2px 0 14px}

/* TABS */
.tabs{display:flex;justify-content:center;gap:6px;padding:0 12px 14px;flex-wrap:wrap}
.tab{padding:9px 22px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.85em;border:2px solid #f59e0b44;color:#f59e0b;background:transparent;transition:all .2s}
.tab.active,.tab:hover{background:#f59e0b;color:#111827}

/* OUTER LAYOUT */
.main{display:flex;max-width:1900px;margin:0 auto;height:calc(100vh - 120px)}
.schedule{flex:1;min-width:0;overflow:auto}
.sidebar{width:280px;min-width:280px;padding:14px;overflow-y:auto;background:#0f172a;border-left:1px solid #1e293b}

/* DAY */
.day{display:none}.day.active{display:block}

/* ── AGENDA ─────────────────────────────────────── */

/* Sticky header row: empty gutter + room names */
.agenda-header{display:flex;position:sticky;top:0;z-index:30;background:#111827;border-bottom:2px solid #334155;padding-bottom:0}
.ah-gutter{width:52px;flex-shrink:0;border-right:1px solid #334155}
.ah-rooms{display:flex;flex:1;min-width:0}
.ah-room{flex:1;min-width:120px;text-align:center;padding:7px 4px;font-size:.63em;font-weight:700;color:#cbd5e1;border-right:1px solid #334155;line-height:1.3}

/* Body: gutter + event canvas */
.agenda-body{display:flex}
.time-gutter{width:52px;flex-shrink:0;position:relative;border-right:1px solid #334155}
.tick{position:absolute;right:6px;font-size:.66em;color:#94a3b8;transform:translateY(-50%);white-space:nowrap;line-height:1;font-weight:600}
.tick::after{content:'';position:absolute;left:calc(100% + 3px);top:50%;width:6px;height:1px;background:#475569}

/* Event canvas */
.cols-area{flex:1;position:relative;min-width:0}
.hlines{position:absolute;inset:0;pointer-events:none;z-index:1}
.hline{position:absolute;left:0;right:0;height:1px;background:#1e293b}
.hline.bold{background:#334155}

/* Notice bands */
.nband{position:absolute;left:0;right:0;z-index:2;display:flex;align-items:center;padding:0 10px;gap:8px;font-size:.72em;pointer-events:none;overflow:hidden;font-weight:500}
.nband.meal{background:#0d1f1f;border-top:1px solid #0f766e;border-bottom:1px solid #0f766e;color:#2dd4bf}
.nband.special{background:#1c1a08;border-top:1px solid #b45309;border-bottom:1px solid #b45309;color:#fbbf24}
.nband.normal{background:#131e2e;border-top:1px solid #334155;border-bottom:1px solid #334155;color:#94a3b8}
.nband .nt{font-weight:700;white-space:nowrap;flex-shrink:0;opacity:.9}

/* Room columns */
.room-cols{display:flex;position:absolute;inset:0;z-index:3}
.room-col{flex:1;min-width:120px;position:relative;border-right:1px solid #1e293b}

/* Event blocks */
.eblock{position:absolute;left:3px;right:3px;border-radius:6px;overflow:hidden;transition:filter .15s,box-shadow .15s}

/* Selectable card blocks */
.eblock.card{cursor:pointer;border:2px solid transparent;z-index:5}
.eblock.card:hover{filter:brightness(1.2);z-index:20}
.eblock.card.selected{border-color:#fff!important;box-shadow:0 0 0 2px #ffffff22,0 4px 20px #0008;z-index:10}
.eblock.card.conflict{border-color:#ef4444!important;box-shadow:0 0 0 2px #ef444444!important}
.eblock.card .c-instr{font-size:.76em;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}
.eblock.card .c-ttl{font-size:.69em;line-height:1.3;color:#e2e8f0;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.eblock.card .c-tags{display:flex;gap:3px;flex-wrap:wrap}
.weapon-tag,.lvl-tag{font-size:.6em;padding:1px 5px;border-radius:8px;background:#ffffff28;font-weight:600;color:#fff}
.eblock.card .badge{position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:50%;background:#fff;color:#111;font-size:.62em;display:none;align-items:center;justify-content:center;font-weight:900}
.eblock.card.selected .badge{display:flex}
.eblock.card-inner{padding:7px 9px;height:100%}

/* Tooltip */
.eblock.card[data-desc]:hover::after{content:attr(data-desc);position:absolute;left:0;bottom:calc(100% + 5px);z-index:200;background:#0f172a;border:1px solid #f59e0b44;padding:8px 10px;border-radius:6px;font-size:.7em;width:260px;white-space:normal;line-height:1.45;pointer-events:none;color:#cbd5e1;box-shadow:0 6px 24px #000a;text-overflow:initial;-webkit-line-clamp:initial;overflow:initial;display:block}

/* Conference blocks */
.eblock.conf{background:#1e293b;border:1px solid #f59e0b33;z-index:4;padding:6px 8px}
.conf .cb-badge{font-size:.58em;font-weight:800;color:#f59e0b;letter-spacing:1px;margin-bottom:3px}
.conf .cb-ttl{color:#f59e0b;font-size:.72em;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.conf .cb-sub{color:#64748b;font-size:.65em;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Free sparring filler */
.eblock.sparring{background:#0d1b2e;border:1px solid #1e3a5f55;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.sparring .sp-i{font-size:1.1em;opacity:.25}
.sparring .sp-l{color:#4a7aa8;font-size:.6em;font-weight:700;text-align:center;margin-top:4px;line-height:1.4;letter-spacing:.3px}

/* WEAPON COLORS */
.el{background:linear-gradient(160deg,#1d4ed8,#1e3a8a)}
.rapiere{background:linear-gradient(160deg,#4c1d95,#2e1065)}
.messer{background:linear-gradient(160deg,#7f1d1d,#450a0a)}
.sabre{background:linear-gradient(160deg,#7c2d12,#431407)}
.lutte{background:linear-gradient(160deg,#14532d,#052e16)}
.baton{background:linear-gradient(160deg,#3d3a0a,#1a1a02)}
.couteau{background:linear-gradient(160deg,#6b2e12,#3b1c08)}
.bocle{background:linear-gradient(160deg,#1e3a5f,#0c2340)}
.multi{background:linear-gradient(160deg,#3730a3,#1e1b4b)}
.gaulois{background:linear-gradient(160deg,#6b3a1f,#3b2108)}
.boxe{background:linear-gradient(160deg,#6b21a8,#3b0764)}
.dague{background:linear-gradient(160deg,#1e3a5f,#0f2a4a)}
.faucille{background:linear-gradient(160deg,#065f46,#04261b)}
.faux{background:linear-gradient(160deg,#064e3b,#042d1a)}
.arc{background:linear-gradient(160deg,#365314,#1a3209)}
.canne{background:linear-gradient(160deg,#503a10,#2d2006)}

/* SIDEBAR */
.sidebar h2{color:#f59e0b;font-size:.95em;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid #1e293b}
.sel-count{font-size:.75em;color:#64748b;margin-bottom:8px}
.sel-list{list-style:none}
.sel-item{padding:7px 8px;margin-bottom:5px;border-radius:5px;font-size:.75em;border-left:3px solid #f59e0b;background:#1e293b}
.sel-item .si-day{color:#64748b;font-size:.85em}
.sel-item .si-time{color:#f59e0b;font-weight:700}
.sel-item .si-name{font-weight:600;margin:2px 0}
.sel-item .si-instr{color:#94a3b8}
.sel-item.conflict-item{border-left-color:#ef4444;background:#2d1515}
.conflict-warn{color:#f87171;font-size:.72em;margin-top:2px}
.empty-msg{color:#475569;font-size:.8em;text-align:center;padding:18px 0}
.btn-clear{width:100%;margin-top:10px;padding:7px;background:#2d1515;border:1px solid #ef4444;color:#fca5a5;border-radius:5px;cursor:pointer;font-size:.78em}
.btn-clear:hover{background:#3d2020}
.btn-print{width:100%;margin-top:6px;padding:7px;background:#132010;border:1px solid #16a34a;color:#86efac;border-radius:5px;cursor:pointer;font-size:.78em}
.btn-print:hover{background:#1a2d16}
.legend{margin-top:14px;border-top:1px solid #1e293b;padding-top:10px}
.legend h3{font-size:.72em;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.leg-item{display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:.7em;color:#94a3b8}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:#000000bb;z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:#1e293b;border-radius:12px;max-width:520px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 24px 80px #0009;border:1px solid #334155}
.modal-head{padding:18px 20px 14px;border-bottom:1px solid #334155;position:relative}
.modal-head .m-weapon{font-size:.65em;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#94a3b8;margin-bottom:8px}
.modal-head h3{font-size:1.1em;font-weight:800;line-height:1.4;color:#ffffff;margin-bottom:10px;padding-right:44px}
.modal-head .m-meta{display:flex;flex-wrap:wrap;gap:6px}
.m-tag{font-size:.68em;padding:3px 9px;border-radius:10px;background:#0f172a;font-weight:600;color:#94a3b8}
.m-tag.instr{color:#f59e0b;border:1px solid #f59e0b33}
.m-tag.room{color:#38bdf8;border:1px solid #38bdf844}
.m-tag.time{color:#a78bfa;border:1px solid #a78bfa33}
.m-tag.lvl{color:#86efac;border:1px solid #86efac33}
.modal-body{padding:16px 20px 20px}
.modal-body .m-desc{font-size:.82em;color:#cbd5e1;line-height:1.6}
.modal-body .m-equip{margin-top:12px;font-size:.78em;color:#94a3b8;border-top:1px solid #334155;padding-top:10px}
.modal-body .m-equip strong{color:#f59e0b;font-size:.9em}
.modal-close{position:absolute;top:10px;right:10px;background:#334155;border:none;color:#cbd5e1;font-size:1em;cursor:pointer;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.modal-close:hover{background:#ef4444;color:#fff}
.modal-select{width:100%;margin-top:14px;padding:9px;border-radius:7px;cursor:pointer;font-size:.82em;font-weight:700;border:none;transition:filter .15s}
.modal-select.add{background:#f59e0b;color:#111}
.modal-select.remove{background:#2d1515;color:#fca5a5;border:1px solid #ef4444}
.modal-select:hover{filter:brightness(1.1)}
.detail-btn{position:absolute;bottom:5px;right:5px;background:#ffffff22;border:1px solid #ffffff55;color:#fff;font-size:.62em;padding:3px 8px;border-radius:4px;cursor:pointer;z-index:20;font-weight:700;letter-spacing:.3px;backdrop-filter:blur(2px)}
.detail-btn:hover{background:#f59e0b;border-color:#f59e0b;color:#111}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:0 12px 12px;flex-wrap:wrap}
.filter-bar label{font-size:.72em;color:#64748b;white-space:nowrap;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.f-select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:5px 10px;border-radius:6px;font-size:.78em;cursor:pointer;min-width:155px;transition:border-color .15s}
.f-select:focus{outline:none;border-color:#f59e0b}
.f-select.active{border-color:#f59e0b;color:#f59e0b}
.f-reset{background:transparent;border:1px solid #334155;color:#64748b;padding:5px 12px;border-radius:6px;font-size:.78em;cursor:pointer;transition:all .15s;white-space:nowrap}
.f-reset:hover{border-color:#ef4444;color:#ef4444}
.f-count{font-size:.72em;color:#94a3b8;padding:0 4px;min-width:80px}
.f-input{min-width:200px}
.f-input::placeholder{color:#475569}
.eblock.card.faded{opacity:0.1;filter:grayscale(1);pointer-events:none}

@page{size:A4 landscape;margin:8mm}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{margin:0;background:#111827!important}
  h1,.subtitle,.tabs,.filter-bar,.sidebar,.modal-bg,.detail-btn,.badge{display:none!important}
  .main{height:auto!important;display:block!important}
  .schedule{overflow:visible!important}
  .agenda-header{position:relative!important;top:auto!important}

  /* 1 jour = 1 page */
  .day{
    display:block!important;
    zoom:0.65;
    break-after:page;
    page-break-after:always;
  }
  .day:last-child{break-after:avoid;page-break-after:avoid}

  /* Couleur uniquement pour les sessions sélectionnées */
  .eblock.card:not(.selected){
    background:#ffffff!important;
    border:1px solid #94a3b8!important;
  }
  .eblock.card:not(.selected) .c-instr{color:#0f172a!important}
  .eblock.card:not(.selected) .c-ttl{color:#334155!important}
  .eblock.card:not(.selected) .weapon-tag,
  .eblock.card:not(.selected) .lvl-tag{background:#e2e8f0!important;color:#334155!important}

  /* Sessions sélectionnées : couleur conservée + bordure dorée */
  .eblock.card.selected{border:2px solid #f59e0b!important}

  /* Ateliers filtrés : visibles à l'impression */
  .eblock.card.faded{opacity:1!important;filter:none!important}
}
</style>
</head>
<body>
<h1>⚔ HEMAC DIJON 2026 ⚔</h1>
<p class="subtitle">23<sup>es</sup> Rencontres Internationales d'AMHE · 14–17 mai 2026 · Campus universitaire de Dijon</p>

<div class="tabs">

  <button class="tab" onclick="showDay('vendredi')">Vendredi 15 mai</button>

  <button class="tab" onclick="showDay('dimanche')">Dimanche 17 mai</button>
</div>

<div class="filter-bar">
  <label>Discipline</label>
  <select class="f-select" id="f-discipline" onchange="applyFilters()">
    <option value="">Toutes</option>
  </select>
  <label>Niveau</label>
  <select class="f-select" id="f-niveau" onchange="applyFilters()">
    <option value="">Tous</option>
    <option value="Débutant">Débutant</option>
    <option value="Intermédiaire">Intermédiaire</option>

  <button class="f-reset" onclick="resetFilters()">✕ Réinitialiser</button>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <button class="modal-close" onclick="closeModal()">✕</button>

      <div class="m-meta">
        <span class="m-tag instr" id="m-instr"></span>
        <span class="m-tag room" id="m-room"></span>
        <span class="m-tag time" id="m-time"></span>
        <span class="m-tag lvl" id="m-lvl"></span>
      </div>
    </div>
    <div class="modal-body">
      <div class="m-desc" id="m-desc"></div>
      <button class="modal-select" id="m-select-btn" onclick="toggleFromModal()"></button>
    </div>
  </div>
</div>

<div class="main">
<div class="schedule" id="schedule"></div>
<div class="sidebar">
  <h2>🗓 Mon Planning</h2>
  <div class="sel-count" id="sel-count">0 atelier(s) sélectionné(s)</div>
  <ul class="sel-list" id="sel-list"><li class="empty-msg">Clique sur un atelier pour l'ajouter</li></ul>
  <button class="btn-clear" onclick="clearAll()">✕ Tout effacer</button>
  <button class="btn-print" onclick="window.print()">🖨 Imprimer</button>
  <div class="legend"><h3>Disciplines</h3><div id="legend"></div></div>
</div>
</div>

// ─── SCHEDULE CONFIG ─────────────────────────────────────────────────────────

const PX_PER_MIN  = PX_PER_HOUR / 60;

// ─── STATE ───────────────────────────────────────────────────────────────────
const selected = {};
let currentDay = 'jeudi';

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function parseMin(s) {
  const m = s.match(/(\d+)h(\d*)/);
  return m ? parseInt(m[1]) * 60 + parseInt(m[2] || 0) : 0;
}
function parseRange(s) {
  const p = s.split(/\s*[–\-]+\s*/);
  const start = parseMin(p[0]);
  const end   = p[1] ? parseMin(p[1]) : start + 90;
  return {start, end, dur: end - start};
}
function toPx(min, dayStartMin) {
  return (min - dayStartMin) * PX_PER_MIN;
}
function roomToCol(room) {
  return room.split(/[\s–]/)[0].trim();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderAll() {
  const schedule = document.getElementById('schedule');
  schedule.innerHTML = Object.entries(DAYS).map(([dayKey, day]) => {
    const cfg = DAY_CONFIG[dayKey];
    const dayStartMin = cfg.startH * 60;
    const totalH = (cfg.endH - cfg.startH) * PX_PER_HOUR;
    const rooms = day.rooms;
    const workshops = WORKSHOPS.filter(w => w.day === dayKey);

    // Time gutter ticks
    let ticks = '';
    for (let h = cfg.startH; h <= cfg.endH; h++) {
      const top = toPx(h * 60, dayStartMin);
      ticks += `<div class="tick" style="top:${top}px">${h}h</div>`;
    }

    // Hour grid lines (every 30 min)
    let hlines = '';
    for (let m = cfg.startH * 60; m <= cfg.endH * 60; m += 30) {
      const top = toPx(m, dayStartMin);
      const bold = m % 60 === 0 ? ' bold' : '';
      hlines += `<div class="hline${bold}" style="top:${top}px"></div>`;
    }

    // Notice bands
    let bands = '';
    day.notices.forEach(n => {
      const {start, end, dur} = parseRange(n.time);
      const top = toPx(start, dayStartMin);
      const h = Math.max(20, dur * PX_PER_MIN);
      bands += `<div class="nband ${n.cls}" style="top:${top}px;height:${h}px">
        <span class="nt">${n.time}</span>${n.text}
      </div>`;
    });

    // Room columns
    let roomCols = '';
    rooms.forEach(r => {
      const colWs = workshops.filter(w => roomToCol(w.room) === r);
      let blocks = '';

      // Free sparring filler for ZE/ZF/ZG when no workshop in that slot
      if (['ZE','ZF','ZG'].includes(r)) {
        day.slots.forEach(slot => {
          if (colWs.some(w => w.slot === slot.id)) return;
          const {start, end, dur} = parseRange(slot.time);
          const top = toPx(start, dayStartMin);
          const h = dur * PX_PER_MIN;
          blocks += `<div class="eblock sparring" style="top:${top}px;height:${h}px">
            <span class="sp-i">⚔</span>
            <span class="sp-l">Free Sparring</span>
          </div>`;
        });
      }

      // Workshop blocks
      colWs.forEach(w => {
        const {start, end, dur} = parseRange(w.time);
        const top = toPx(start, dayStartMin);
        const h = Math.max(44, dur * PX_PER_MIN);

        if (w.type === 'c') {
          blocks += `<div class="eblock conf" style="top:${top}px;height:${h}px">
            <div class="cb-badge">CONF.</div>
            <div class="cb-ttl">${w.title.replace('CONFÉRENCE – ','')}</div>
            <div class="cb-sub">${w.instructor}</div>
          </div>`;
          return;
        }

        const sel = selected[w.id] ? 'selected' : '';
        const cfl = isConflict(w) ? 'conflict' : '';
        blocks += `<div class="eblock card ${w.css} ${sel} ${cfl}"
          data-id="${w.id}" data-desc="${w.desc}"
          style="top:${top}px;height:${h}px"
          onclick="toggle('${w.id}')">
          <div class="card-inner">
            <div class="c-instr">${w.instructor}</div>
            <div class="c-ttl">${w.title}</div>
            <div class="c-tags">
              <span class="weapon-tag">${w.weapon}</span>
              <span class="lvl-tag">${w.level}</span>
            </div>
          </div>
          <div class="badge">✓</div>
          <button class="detail-btn" onclick="event.stopPropagation();openDetail('${w.id}')">détail</button>
        </div>`;
      });

      roomCols += `<div class="room-col">${blocks}</div>`;
    });

    // Room headers
    const headersHtml = rooms.map(r =>
      `<div class="ah-room">${ROOM_NAMES[r] || r}</div>`
    ).join('');

    return `<div id="day-${dayKey}" class="day${dayKey===currentDay?' active':''}">
      <div class="agenda-header">
        <div class="ah-gutter"></div>
        <div class="ah-rooms">${headersHtml}</div>
      </div>
      <div class="agenda-body">
        <div class="time-gutter" style="height:${totalH}px">${ticks}</div>
        <div class="cols-area" style="height:${totalH}px">
          <div class="hlines">${hlines}</div>
          ${bands}
          <div class="room-cols" style="position:absolute;inset:0;display:flex">${roomCols}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  renderLegend();
  renderSidebar();
  applyFilters();
}

function renderLegend() {
  const used = [...new Set(WORKSHOPS.filter(w=>w.css).map(w=>w.css))];
  document.getElementById('legend').innerHTML = used.map(css => {
    const c = WEAPON_COLORS[css]; if (!c) return '';
    return `<div class="leg-item"><div class="leg-dot" style="background:${c.bg}"></div>${c.label}</div>`;
  }).join('');
}

// ─── LOGIC ───────────────────────────────────────────────────────────────────
function isConflict(w) {
  return Object.values(selected).some(s => s.id !== w.id && s.day === w.day && s.slot === w.slot);
}

function toggle(id) {
  const w = WORKSHOPS.find(x => x.id === id);
  if (!w) return;
  if (selected[id]) delete selected[id]; else selected[id] = w;
  renderAll();
  showDay(currentDay);
}

function showDay(day) {
  currentDay = day;
  document.querySelectorAll('.day').forEach(d => d.classList.remove('active'));
  const el = document.getElementById('day-' + day);
  if (el) el.classList.add('active');
  document.querySelectorAll('.tab').forEach((t,i) =>
    t.classList.toggle('active', ['jeudi','vendredi','samedi','dimanche'][i] === day));
  renderSidebar();
}

function renderSidebar() {
  const list = document.getElementById('sel-list');
  const count = document.getElementById('sel-count');
  const items = Object.values(selected);
  count.textContent = items.length + ' atelier(s) sélectionné(s)';
  if (!items.length) { list.innerHTML = '<li class="empty-msg">Clique sur un atelier pour l\'ajouter</li>'; return; }
  const dayOrder = {jeudi:0,vendredi:1,samedi:2,dimanche:3};
  items.sort((a,b) => dayOrder[a.day]-dayOrder[b.day] || a.slot.localeCompare(b.slot));
  const slotConf = {};
  items.forEach(w => { const k=w.day+'|'+w.slot; slotConf[k]=(slotConf[k]||0)+1; });
  list.innerHTML = items.map(w => {
    const k=w.day+'|'+w.slot, hasCfl=slotConf[k]>1;
    const dl = {jeudi:'Jeu 14',vendredi:'Ven 15',samedi:'Sam 16',dimanche:'Dim 17'}[w.day];
    return `<li class="sel-item${hasCfl?' conflict-item':''}">
      <div class="si-day">${dl} mai</div>
      <div class="si-time">⏰ ${w.time}</div>
      <div class="si-name">${w.title}</div>
      <div class="si-instr">👤 ${w.instructor}</div>
      ${hasCfl?'<div class="conflict-warn">⚠ Conflit horaire !</div>':''}
    </li>`;
  }).join('');
  document.querySelectorAll('.eblock.card').forEach(card => {
    const id = card.dataset.id;
    if (!id) return;
    const w = WORKSHOPS.find(x => x.id === id);
    if (w) card.classList.toggle('conflict', !!selected[id] && isConflict(w));
  });
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
let modalWorkshopId = null;

function openDetail(id) {
  const w = WORKSHOPS.find(x => x.id === id);
  if (!w) return;
  modalWorkshopId = id;

  // Split desc into description and equipment (after "Matériel :")
  const matIdx = w.desc.indexOf('Matériel');
  const descText   = matIdx > -1 ? w.desc.slice(0, matIdx).trim() : w.desc;
  const equipText  = matIdx > -1 ? w.desc.slice(matIdx) : '';

  document.getElementById('m-weapon').textContent = w.weapon;
  document.getElementById('m-title').textContent  = w.title;
  document.getElementById('m-instr').textContent  = '👤 ' + w.instructor;
  document.getElementById('m-room').textContent   = '📍 ' + (ROOM_NAMES[w.room] || w.room);
  document.getElementById('m-time').textContent   = '⏰ ' + w.time;
  document.getElementById('m-lvl').textContent    = w.level;
  document.getElementById('m-desc').textContent   = descText;

  const equipEl = document.getElementById('m-equip') || (() => {
    const el = document.createElement('div');
    el.id = 'm-equip'; el.className = 'm-equip';
    document.getElementById('m-desc').after(el);
    return el;
  })();
  equipEl.innerHTML = equipText ? `<strong>Matériel :</strong> ${equipText.replace(/^Matériel\s*:\s*/,'')}` : '';

  // Colour the weapon tag to match the card
  const wc = WEAPON_COLORS[w.css];
  document.getElementById('m-weapon').style.color = wc ? wc.bg.replace('linear-gradient(160deg,','').split(',')[0] : '#94a3b8';

  refreshModalBtn();
  document.getElementById('modal-bg').classList.add('open');
}

function refreshModalBtn() {
  const btn = document.getElementById('m-select-btn');
  if (!modalWorkshopId) return;
  const w = WORKSHOPS.find(x => x.id === modalWorkshopId);
  if (!w || w.type === 'c') { btn.style.display = 'none'; return; }
  btn.style.display = 'block';
  if (selected[modalWorkshopId]) {
    btn.textContent = '✕ Retirer de mon planning';
    btn.className = 'modal-select remove';
  } else {
    btn.textContent = '+ Ajouter à mon planning';
    btn.className = 'modal-select add';
  }
}

function toggleFromModal() {
  if (!modalWorkshopId) return;
  toggle(modalWorkshopId);
  refreshModalBtn();
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-bg')) return;
  document.getElementById('modal-bg').classList.remove('open');
  modalWorkshopId = null;
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function clearAll() {
  Object.keys(selected).forEach(k => delete selected[k]);
  renderAll(); showDay(currentDay);
}

// ─── FILTERS ─────────────────────────────────────────────────────────────────
function initFilters() {
  const discSel = document.getElementById('f-discipline');
  Object.entries(WEAPON_COLORS).forEach(([css, {label}]) => {
    if (WORKSHOPS.some(w => w.css === css)) {
      const o = document.createElement('option');
      o.value = css; o.textContent = label;
      discSel.appendChild(o);
    }
  });
  const instrList = document.getElementById('instructeur-list');
  [...new Set(WORKSHOPS.filter(w => w.instructor).map(w => w.instructor))].sort((a,b) => a.split(' ').pop().localeCompare(b.split(' ').pop())).forEach(i => {
    const o = document.createElement('option');
    o.value = i;
    instrList.appendChild(o);
  });
}

function applyFilters() {
  const disc  = document.getElementById('f-discipline').value;
  const niv   = document.getElementById('f-niveau').value;
  const instr = document.getElementById('f-instructeur').value;

  ['f-discipline','f-niveau','f-instructeur'].forEach(id => {
    document.getElementById(id).classList.toggle('active', !!document.getElementById(id).value);
  });

  let matched = 0;
  document.querySelectorAll('.eblock.card[data-id]').forEach(card => {
    const w = WORKSHOPS.find(x => x.id === card.dataset.id);
    if (!w) return;
    const ok = (!disc  || w.css === disc) &&
               (!niv   || w.level === niv) &&
               (!instr || w.instructor.toLowerCase().includes(instr.toLowerCase()));
    card.classList.toggle('faded', !ok);
    if (ok) matched++;
  });

  const countEl = document.getElementById('f-count');
  countEl.textContent = (disc || niv || instr)
    ? `${matched} atelier${matched > 1 ? 's' : ''}`
    : '';
}

function resetFilters() {
  ['f-discipline','f-niveau','f-instructeur'].forEach(id => {
    const el = document.getElementById(id);
    el.value = ''; el.classList.remove('active');
  });
  document.getElementById('f-count').textContent = '';
  document.querySelectorAll('.eblock.card.faded').forEach(c => c.classList.remove('faded'));
}

renderAll();
initFilters();
</script>
